<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>React</title>
</head>
<body>
    <button>Click Me</button>
</body>
<script>
    class Button {
        Constructor(){
            this.library = "React";
            this.server = "http://localhost:3000";

            document
                .querySelector("button")
                .addEventListener("click", this.clickMe.bind(this));
        }

        clickMe(){
            console.log("Button clicked!");
            console.log(`You are using ${this.library} and the server is ${this.server}`);
        }
    }

    const button = new Button();
</script>
</html>
